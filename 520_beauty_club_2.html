<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trello de 520 Beauty Club</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:0;height:0}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;background:linear-gradient(135deg,#e91e8c 0%,#c2185b 35%,#ad1457 65%,#880e4f 100%);display:flex;flex-direction:column;overflow-x:hidden}
.header{padding:20px 24px 8px;color:#fff;flex-shrink:0}
.header-top{display:flex;align-items:center;gap:12px;margin-bottom:3px}
.logo{width:34px;height:34px;background:rgba(255,255,255,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header h1{font-size:18px;font-weight:700;letter-spacing:.03em;color:#fff}
.header p{font-size:12px;color:rgba(255,255,255,.75);margin-left:46px}
.month-tabs{display:flex;gap:6px;padding:10px 24px 0;overflow-x:auto;flex-shrink:0}
.month-tabs::-webkit-scrollbar{display:none}
.tab{background:rgba(0,0,0,.2);border:none;border-radius:20px;color:rgba(255,255,255,.75);font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.tab.active{background:rgba(255,255,255,.25);color:#fff}
.tab:hover:not(.active){background:rgba(0,0,0,.3);color:#fff}
.board{flex:1;display:flex;gap:12px;padding:12px 16px 90px;overflow-x:auto;align-items:flex-start;scroll-snap-type:x mandatory}
.board::-webkit-scrollbar{display:none}
.column{background:#1d1d1f;border-radius:14px;min-width:280px;max-width:300px;flex-shrink:0;padding:14px;scroll-snap-align:start;display:flex;flex-direction:column;gap:0}
.col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.col-title{font-size:16px;font-weight:700;color:#fff}
.col-count{font-size:11px;color:#888;background:#2c2c2e;border-radius:10px;padding:2px 8px}
.day-section{margin-bottom:10px}
.day-label{font-size:11px;font-weight:700;color:#c084fc;text-transform:uppercase;letter-spacing:.08em;padding:6px 4px 4px;border-top:1px solid #2c2c2e;margin-top:4px}
.day-label:first-child{border-top:none;margin-top:0}
.cita-card{background:#2c2c2e;border-radius:8px;padding:9px 10px;display:flex;align-items:flex-start;gap:8px;margin-bottom:4px;cursor:default}
.cita-card.editable{cursor:pointer;transition:background .15s}
.cita-card.editable:hover{background:#3a3a3c}
.check{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px}
.check.done{background:#7ed321}
.check.done svg{display:block}
.check svg{display:none;width:11px;height:11px;stroke:#fff;stroke-width:2.5;fill:none}
.check.pending{border:2px solid #555}
.cita-text{font-size:12.5px;color:#e5e5e7;flex:1;line-height:1.4}
.cita-text.tachado{text-decoration:line-through;opacity:.45}
.del-btn{background:none;border:none;cursor:pointer;color:#555;font-size:16px;line-height:1;padding:0 2px;border-radius:4px;opacity:0;transition:opacity .15s,color .15s;flex-shrink:0}
.cita-card.editable:hover .del-btn{opacity:1}
.del-btn:hover{color:#ff453a}
.day-off{background:#2c2c2e;border-radius:8px;padding:8px 10px;margin-bottom:4px;font-size:12px;color:#666;font-style:italic}
.add-cita-area{margin-top:6px;padding-top:6px;border-top:1px solid #2c2c2e}
.add-day-btn{background:none;border:none;cursor:pointer;color:#888;font-size:12px;padding:7px 4px;display:flex;align-items:center;gap:5px;border-radius:7px;width:100%;text-align:left;transition:all .15s}
.add-day-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.add-form{display:none;flex-direction:column;gap:7px;margin-top:4px}
.add-form.open{display:flex}
.form-row{display:flex;gap:6px}
.add-form input,.add-form select{background:#3a3a3c;border:1.5px solid #555;border-radius:7px;color:#fff;font-family:inherit;font-size:12px;padding:7px 9px;outline:none;width:100%;transition:border-color .15s}
.add-form input:focus,.add-form select:focus{border-color:#c084fc}
.add-form input::placeholder{color:#666}
.add-form select option{background:#2c2c2e;color:#fff}
.btn-save{background:#c084fc;color:#1a1a1a;border:none;border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;padding:7px 12px;cursor:pointer;flex-shrink:0;transition:background .15s}
.btn-save:hover{background:#d8b4fe}
.btn-x{background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1;border-radius:4px;padding:0 3px;transition:color .15s}
.btn-x:hover{color:#fff}
.total-bar{background:#2c2c2e;border-radius:8px;padding:8px 10px;margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.total-label{font-size:11px;color:#888}
.total-val{font-size:13px;font-weight:700;color:#7ed321}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 20px 18px;display:flex;justify-content:center;gap:12px;z-index:50}
.bar-pill{background:rgba(60,0,30,.88);backdrop-filter:blur(12px);border-radius:40px;display:flex;overflow:hidden}
.bar-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.9);width:48px;height:44px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:background .15s}
.bar-btn:hover{background:rgba(255,255,255,.12)}
.bar-expand{background:rgba(60,0,30,.88);backdrop-filter:blur(12px);border-radius:50%;width:48px;height:48px;border:none;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center}
.bar-expand:hover{background:rgba(100,0,50,.9)}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(12px);background:#3a3a3c;color:#fff;font-size:12px;padding:8px 16px;border-radius:18px;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:300;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty-col{text-align:center;color:#555;font-size:12px;padding:20px 10px}
</style>
</head>

const MONTHS = Object.keys(HISTORY);
let customData = {};
try { customData = JSON.parse(localStorage.getItem('beauty520_custom') || '{}'); } catch(e){}

function saveCustom(){ try{localStorage.setItem('beauty520_custom',JSON.stringify(customData));}catch(e){} }

function isPast(date){ return date < TODAY; }
function isToday(date){ return date === TODAY; }

function countCitas(month){
  let n = 0;
  (HISTORY[month]||[]).forEach(d => n += d.citas.length);
  const cd = customData[month] || [];
  cd.forEach(d => n += (d.citas||[]).length);
  return n;
}

function totalIngresos(month){
  let t = 0;
  function parse(c){ const m = c.match(/\$(\d+)/g); if(m) m.forEach(x=>t+=parseInt(x.replace('$',''))); }
  (HISTORY[month]||[]).forEach(d => d.citas.forEach(parse));
  (customData[month]||[]).forEach(d => (d.citas||[]).forEach(parse));
  return t;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  renderTabs();
  renderBoard();
}

function renderTabs(){
  const el = document.getElementById('month-tabs');
  el.innerHTML = '';
  MONTHS.forEach((m,i)=>{
    const b = document.createElement('button');
    b.className = 'tab' + (i===0?' active':'');
    b.textContent = m.split(' ')[0]; // short name
    b.dataset.idx = i;
    b.onclick = ()=>{ scrollToMonth(i); };
    el.appendChild(b);
  });
}

function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';

  MONTHS.forEach((month, mi)=>{
    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.mi = mi;

    const total = countCitas(month);
    col.innerHTML = `<div class="col-header"><span class="col-title">${month}</span><span class="col-count">${total} citas</span></div>`;

    // Historical days
    (HISTORY[month]||[]).forEach(dayObj=>{
      const past = isPast(dayObj.date);
      const today = isToday(dayObj.date);

      const section = document.createElement('div');
      section.className = 'day-section';
      const lbl = document.createElement('div');
      lbl.className = 'day-label';
      lbl.innerHTML = `${dayObj.d}${today?' <span style="background:#c084fc;color:#1a1a1a;border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700">HOY</span>':''}`;
      section.appendChild(lbl);

      if(dayObj.off && dayObj.citas.length===0){
        const off = document.createElement('div');
        off.className = 'day-off';
        off.textContent = dayObj.off;
        section.appendChild(off);
      } else {
        dayObj.citas.forEach(c=>{
          const card = document.createElement('div');
          card.className = 'cita-card' + (past||today?' editable':'');
          card.innerHTML = `
            <div class="check ${(past||today)?'done':'pending'}">
              <svg viewBox="0 0 11 11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5"/></svg>
            </div>
            <span class="cita-text ${(past||today)?'tachado':''}">${c}</span>
          `;
          section.appendChild(card);
        });
      }

      // Allow adding to today's section
      if(today){
        const addBtn = document.createElement('button');
        addBtn.className = 'add-day-btn';
        addBtn.style.marginTop='4px';
        addBtn.innerHTML = '＋ Agregar cita de hoy';
        addBtn.onclick = ()=> openInlineForm(section, month, dayObj.d, dayObj.date, addBtn);
        section.appendChild(addBtn);
      }

      col.appendChild(section);
    });

    // Custom (new) days for this month
    (customData[month]||[]).forEach((dayObj, di)=>{
      const past = isPast(dayObj.date);
      const section = document.createElement('div');
      section.className = 'day-section';
      const lbl = document.createElement('div');
      lbl.className = 'day-label';
      lbl.style.color = past ? '#888' : '#7ed321';
      lbl.textContent = dayObj.d;
      section.appendChild(lbl);

      (dayObj.citas||[]).forEach((c, ci)=>{
        const card = document.createElement('div');
        card.className = 'cita-card editable';
        card.innerHTML = `
          <div class="check ${past?'done':'pending'}">
            <svg viewBox="0 0 11 11"><polyline points="1.5,5.5 4.5,8.5 9.5,2.5"/></svg>
          </div>
          <span class="cita-text ${past?'tachado':''}">${c}</span>
          <button class="del-btn" onclick="deleteCita('${month}',${di},${ci})">×</button>
        `;
        section.appendChild(card);
      });

      const addBtn = document.createElement('button');
      addBtn.className = 'add-day-btn';
      addBtn.style.marginTop='4px';
      addBtn.innerHTML = '＋ Agregar otra cita';
      addBtn.onclick = ()=> openInlineFormCustom(section, month, di, addBtn);
      section.appendChild(addBtn);

      col.appendChild(section);
    });

    // Add new day button (always for active/future months)
    const addArea = document.createElement('div');
    addArea.className = 'add-cita-area';
    addArea.id = 'addArea-' + mi;
    const addBtn = document.createElement('button');
    addBtn.className = 'add-day-btn';
    addBtn.innerHTML = '＋ Escribir nueva cita';
    addBtn.onclick = ()=> openNewDayForm(addArea, month, addBtn);
    addArea.appendChild(addBtn);
    col.appendChild(addArea);

    // Total
    const t = totalIngresos(month);
    if(t > 0){
      const tbar = document.createElement('div');
      tbar.className = 'total-bar';
      tbar.innerHTML = `<span class="total-label">Total ingresos</span><span class="total-val">$${t.toLocaleString()}</span>`;
      col.appendChild(tbar);
    }

    board.appendChild(col);
  });

  // Sync tabs on scroll
  board.addEventListener('scroll', syncTabs, {passive:true});
}

// ─── INLINE FORMS ─────────────────────────────────────────────────────────────
function openInlineForm(section, month, dayLabel, date, btn){
  if(section.querySelector('.add-form.open')) return;
  btn.style.display='none';
  const f = document.createElement('div');
  f.className = 'add-form open';
  f.innerHTML = `
    <input type="text" placeholder="Ej: 3:00pm — Uñas con Diseño $390" id="if-input"/>
    <div class="form-rows" style="display:flex;gap:6px">
      <button class="btn-save" onclick="saveInlineToday('${month}','${dayLabel}','${date}',this)">Agregar</button>
      <button class="btn-x" onclick="cancelInline(this,'${month}','${dayLabel}','${date}')">×</button>
    </div>`;
  section.appendChild(f);
  f.querySelector('input').focus();
  f.querySelector('input').addEventListener('keydown',e=>{
    if(e.key==='Enter') saveInlineToday(month,dayLabel,date,f.querySelector('.btn-save'));
    if(e.key==='Escape') cancelInline(f.querySelector('.btn-x'),month,dayLabel,date);
  });
}

function cancelInline(btn,month,dayLabel,date){
  const f = btn.closest('.add-form');
  const section = f.parentElement;
  f.remove();
  const addBtn = document.createElement('button');
  addBtn.className = 'add-day-btn';
  addBtn.style.marginTop='4px';
  addBtn.innerHTML = '＋ Agregar cita de hoy';
  addBtn.onclick = ()=> openInlineForm(section,month,dayLabel,date,addBtn);
  section.appendChild(addBtn);
}

function saveInlineToday(month,dayLabel,date,btn){
  const f = btn.closest('.add-form');
  const val = f.querySelector('input').value.trim();
  if(!val) return;
  if(!customData[month]) customData[month]=[];
  let dayEntry = customData[month].find(d=>d.date===date);
  if(!dayEntry){ dayEntry={d:dayLabel,date,citas:[]}; customData[month].push(dayEntry); }
  dayEntry.citas.push(val);
  saveCustom();
  showToast('Cita agregada ✓');
  renderBoard();
}

function openInlineFormCustom(section, month, di, btn){
  if(section.querySelector('.add-form.open')) return;
  btn.style.display='none';
  const f = document.createElement('div');
  f.className = 'add-form open';
  f.innerHTML = `
    <input type="text" placeholder="Ej: 4:00pm — Retoque $270" id="ifc-input"/>
    <div style="display:flex;gap:6px">
      <button class="btn-save" onclick="saveCustomCita('${month}',${di},this)">Agregar</button>
      <button class="btn-x" onclick="this.closest('.add-form').remove();renderBoard()">×</button>
    </div>`;
  section.appendChild(f);
  f.querySelector('input').focus();
  f.querySelector('input').addEventListener('keydown',e=>{
    if(e.key==='Enter') saveCustomCita(month,di,f.querySelector('.btn-save'));
    if(e.key==='Escape'){ f.remove(); renderBoard(); }
  });
}

function saveCustomCita(month,di,btn){
  const f = btn.closest('.add-form');
  const val = f.querySelector('input').value.trim();
  if(!val) return;
  customData[month][di].citas.push(val);
  saveCustom();
  showToast('Cita agregada ✓');
  renderBoard();
}

function openNewDayForm(area, month, btn){
  if(area.querySelector('.add-form.open')) return;
  btn.style.display='none';
  const f = document.createElement('div');
  f.className = 'add-form open';
  f.innerHTML = `
    <input type="text" id="ndf-day" placeholder="Día — Ej: Jueves 14"/>
    <input type="text" id="ndf-cita" placeholder="Cita — Ej: 10:00am — Uñas $390"/>
    <input type="date" id="ndf-date" style="color:#ccc"/>
    <div style="display:flex;gap:6px">
      <button class="btn-save" onclick="saveNewDay('${month}',this)">Guardar</button>
      <button class="btn-x" onclick="this.closest('.add-form').remove();renderBoard()">×</button>
    </div>`;
  area.appendChild(f);
  f.querySelector('#ndf-day').focus();
}

function saveNewDay(month, btn){
  const f = btn.closest('.add-form');
  const dayLabel = f.querySelector('#ndf-day').value.trim();
  const cita = f.querySelector('#ndf-cita').value.trim();
  const date = f.querySelector('#ndf-date').value || TODAY;
  if(!dayLabel || !cita){ showToast('Escribe el día y la cita'); return; }
  if(!customData[month]) customData[month]=[];
  let dayEntry = customData[month].find(d=>d.d===dayLabel);
  if(!dayEntry){ dayEntry={d:dayLabel,date,citas:[]}; customData[month].push(dayEntry); }
  dayEntry.citas.push(cita);
  saveCustom();
  showToast('Día y cita guardados ✓');
  renderBoard();
}

function deleteCita(month, di, ci){
  customData[month][di].citas.splice(ci,1);
  if(customData[month][di].citas.length===0) customData[month].splice(di,1);
  saveCustom();
  renderBoard();
}

// ─── SCROLL & TABS ────────────────────────────────────────────────────────────
function scrollToMonth(idx){
  const board = document.getElementById('board');
  const cols = board.querySelectorAll('.column');
  if(cols[idx]) cols[idx].scrollIntoView({behavior:'smooth',block:'nearest',inline:'start'});
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
}

function syncTabs(){
  const board = document.getElementById('board');
  const cols = board.querySelectorAll('.column');
  const bRect = board.getBoundingClientRect();
  let active = 0;
  cols.forEach((col,i)=>{ if(col.getBoundingClientRect().left - bRect.left < 40) active=i; });
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===active));
}

function showSummary(){
  let msg = '📊 RESUMEN 520 BEAUTY CLUB\n\n';
  MONTHS.forEach(m=>{ msg += `${m}: $${totalIngresos(m).toLocaleString()} (${countCitas(m)} citas)\n`; });
  alert(msg);
}

function doSearch(){
  const q = prompt('Buscar cita:');
  if(!q) return;
  let found = [];
  MONTHS.forEach(m=>{
    (HISTORY[m]||[]).forEach(d=>d.citas.forEach(c=>{ if(c.toLowerCase().includes(q.toLowerCase())) found.push(`${m} — ${d.d}: ${c}`); }));
    (customData[m]||[]).forEach(d=>(d.citas||[]).forEach(c=>{ if(c.toLowerCase().includes(q.toLowerCase())) found.push(`${m} — ${d.d}: ${c}`); }));
  });
  alert(found.length ? found.join('\n') : 'No se encontraron citas con "' + q + '"');
}

  if(!customData[month]) customData[month]=[];
  let d = customData[month].find(x=>x.d===dayLabel);
  if(!d){ d={d:dayLabel,date,citas:[]}; customData[month].push(d); }
  d.citas.push(cita);
  saveCustom();
  showToast('Cita guardada ✓');
  render();
}

function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

render();
</script>
